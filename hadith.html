<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>40 Hadith Nawawi - Chair Islamic TV</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0A0A0A">
<link rel="apple-touch-icon" href="logo.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h1>📜 40 Hadith Nawawi</h1>
  <p class="page-header">Authentic Collection - Verified</p>

  <div class="card">
    <input type="text" id="hadithSearch" placeholder="Search hadith number, title, or Arabic..." onkeyup="searchHadith()">
  </div>

  <div id="hadithList">
    <!-- Hadiths load here from JSON -->
    <div class="card"><p class="text-body">Loading hadiths...</p></div>
  </div>

  <div class="card">
    <div class="card-title">All 40 Hadith Complete</div>
    <p class="arabic" style="font-size:20px; text-align:center;">تَمَّتِ الأَرْبَعُونَ النَّوَوِيَّةُ</p>
    <button class="btn-gold" onclick="location.href='index.html'">🏠 Back to Home</button>
  </div>

</div>

<div class="bottom-nav">
  <a href="index.html">🏠<br>Home</a>
  <a href="quran.html">📖<br>Qur'an</a>
  <a href="hadith.html" class="active">📜<br>Hadith</a>
  <a href="prayer.html">🕌<br>Prayer</a>
  <a href="videos.html">🎥<br>Videos</a>
</div>

<script>
// ===============================
// LOAD HADITH FROM JSON
// ===============================
let allHadiths = [];

async function loadHadiths() {
  try {
    const response = await fetch('hadith.json');
    allHadiths = await response.json();
    renderHadiths(allHadiths);
  } catch (err) {
    document.getElementById('hadithList').innerHTML = 
      '<div class="card"><p class="text-body">Error loading hadiths. Check hadith.json file.</p></div>';
  }
}

function renderHadiths(hadiths) {
  const container = document.getElementById('hadithList');
  container.innerHTML = hadiths.map(h => `
    <div class="card hadith-item" id="hadith${h.id}">
      <div class="card-title">Hadith ${h.id} of 40 - ${h.title}</div>
      <p class="arabic">${h.arabic}</p>
      <div class="divider"></div>
      <p class="text-body">${h.english}</p>
      <div class="badge">${h.reference}</div>
      <div class="btn-group">
        <button class="btn-outline" onclick="shareHadith(${h.id})">📤 Share</button>
        <button class="btn-outline" onclick="saveHadith(${h.id})">🤍 Save</button>
      </div>
    </div>
  `).join('');
}

// ===============================
// SEARCH HADITH
// ===============================
function searchHadith() {
  const term = document.getElementById('hadithSearch').value.toLowerCase();
  const filtered = allHadiths.filter(h => 
    h.title.toLowerCase().includes(term) || 
    h.arabic.includes(term) || 
    h.english.toLowerCase().includes(term) ||
    h.id.toString() === term
  );
  renderHadiths(filtered);
}

// ===============================
// SHARE HADITH
// ===============================
function shareHadith(id) {
  const h = allHadiths.find(x => x.id === id);
  const text = `${h.arabic}\n\n${h.english}\n\n${h.reference}\n\nFrom Chair Islamic TV:\n${window.location.origin}/hadith.html#hadith${id}`;
  
  if (navigator.share) {
    navigator.share({ title: `Hadith ${id} - ${h.title}`, text: text });
  } else {
    navigator.clipboard.writeText(text);
    alert('Hadith copied! Share on WhatsApp ✅');
  }
}

// ===============================
// SAVE HADITH
// ===============================
function saveHadith(id) {
  let saved = JSON.parse(localStorage.getItem('savedHadiths') || '[]');
  if (!saved.includes(id)) {
    saved.push(id);
    localStorage.setItem('savedHadiths', JSON.stringify(saved));
    alert(`🤍 Hadith ${id} saved!`);
  } else {
    alert('Already saved');
  }
}

// Load on page start
loadHadiths();
</script>

</body>
</html>

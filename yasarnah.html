<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yasarnah - Learn Arabic Letters</title>

<style>

body{
font-family:Arial;
background:#000;
color:#FFD700;
margin:0;
padding:20px;
text-align:center;
}

h1{
margin-bottom:20px;
}

#lessonBox{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.lesson{
background:#111;
padding:15px;
border-radius:12px;
transition:0.3s;
}

.lesson.active{
border:2px solid gold;
background:#1a1a1a;
}

.arabic{
font-size:42px;
margin-bottom:10px;
}

button{
background:#FFD700;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

.controls{
margin-top:20px;
}

</style>
</head>

<body>

<h1>📖 Yasarnah (Alif → Yaa)</h1>

<div id="lessonBox"></div>

<div class="controls">
<button onclick="stopLesson()">⏸ Stop</button>
</div>

<script>

// =====================
// LETTERS (REAL ARABIC)
// =====================

const letters = [
{a:"ا", name:"Alif"},
{a:"ب", name:"Ba"},
{a:"ت", name:"Ta"},
{a:"ث", name:"Tha"},
{a:"ج", name:"Jeem"},
{a:"ح", name:"Ha"},
{a:"خ", name:"Kha"},
{a:"د", name:"Dal"},
{a:"ذ", name:"Dhal"},
{a:"ر", name:"Ra"},
{a:"ز", name:"Zay"},
{a:"س", name:"Seen"},
{a:"ش", name:"Sheen"},
{a:"ص", name:"Sad"},
{a:"ض", name:"Dad"},
{a:"ط", name:"Taa"},
{a:"ظ", name:"Zaa"},
{a:"ع", name:"Ain"},
{a:"غ", name:"Ghain"},
{a:"ف", name:"Fa"},
{a:"ق", name:"Qaf"},
{a:"ك", name:"Kaf"},
{a:"ل", name:"Lam"},
{a:"م", name:"Meem"},
{a:"ن", name:"Noon"},
{a:"ه", name:"Ha"},
{a:"و", name:"Waw"},
{a:"ي", name:"Yaa"}
];

// =====================
// SETTINGS
// =====================

let repeatCount = 3;

// =====================
// BUILD UI
// =====================

const box = document.getElementById("lessonBox");

letters.forEach((l,i)=>{
box.innerHTML += `
<div class="lesson" onclick="startLetter(${i})">
<div class="arabic">${l.a}</div>
<div>${l.name}</div>
<button>▶ Learn</button>
</div>
`;
});

// =====================
// AUDIO SYSTEM
// =====================

let currentAudio = null;
let currentIndex = null;
let repeat = 0;
let isPlaying = false;

// =====================
// START / TOGGLE
// =====================

function startLetter(index){

// toggle pause if same
if(currentIndex === index && currentAudio){

if(isPlaying){
currentAudio.pause();
isPlaying = false;
return;
}else{
currentAudio.play();
isPlaying = true;
return;
}

}

// new start
stopLesson();

currentIndex = index;
repeat = 0;
isPlaying = true;

playLetter();

}

// =====================
// PLAY LETTER
// =====================

function playLetter(){

const letter = letters[currentIndex];

// Google TTS (Arabic pronunciation)
const url =
`https://translate.google.com/translate_tts?ie=UTF-8&q=${letter.a}&tl=ar&client=tw-ob`;

currentAudio = new Audio(url);
currentAudio.play();

highlight(currentIndex);

// on end
currentAudio.onended = ()=>{

if(!isPlaying) return;

repeat++;

if(repeat < repeatCount){
playLetter();
return;
}

// next letter
currentIndex++;

if(currentIndex < letters.length){
repeat = 0;
playLetter();
}else{
stopLesson();
}

};

}

// =====================
// STOP
// =====================

function stopLesson(){

if(currentAudio){
currentAudio.pause();
}

isPlaying = false;
currentIndex = null;
repeat = 0;

document.querySelectorAll(".lesson").forEach(l=>{
l.classList.remove("active");
});

}

// =====================
// HIGHLIGHT
// =====================

function highlight(index){

document.querySelectorAll(".lesson").forEach((el,i)=>{
el.classList.toggle("active", i === index);
});

}

</script>

</body>
</html>

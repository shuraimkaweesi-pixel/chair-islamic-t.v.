}

/* Bottom Navigation */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#000;
display:flex;
justify-content:space-around;
padding:12px 0;
border-top:1px solid #333;
}

<script>

/* Load Random Hadith */

async function loadHadith(){

try{

const response = await fetch("https://api.hadith.sutanlab.id/books/muslim?range=1-20");

const data = await response.json();

const hadithList = data.data.hadiths;

const random = hadithList[Math.floor(Math.random()*hadithList.length)];

document.getElementById("hadithBox").innerHTML = `
<p>${random.arab}</p>
<hr>
<p>${random.id}</p>
`;

}catch(error){

document.getElementById("hadithBox").innerHTML="Failed to load hadith.";

}

}

loadHadith();

</script>

</body>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prayer Times | Chair Islamic TV</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFD700">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: #FFD700;
            margin: 0;
            padding: 20px;
            padding-bottom: 100px;
            text-align: center;
        }

        h1 {
            color: #FFD700;
            text-shadow: 1px 1px 3px #000;
            margin-bottom: 5px;
        }

        #location { text-align: center; color: #ddd; font-size: 14px; }

        .prayer-box {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            color: white;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-align: left;
        }

        .prayer {
            display: flex;
            justify-content: space-between;
            padding: 14px;
            border-bottom: 1px solid #333;
        }

        .prayer:last-child { border-bottom: none; }

        .next {
            background: #FFD700;
            color: black;
            font-weight: bold;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }

        .date {
            margin-top: 10px;
            font-size: 18px;
            color: #FFD700;
            text-align: center;
            font-weight: bold;
        }

        #countdown {
            text-align: center;
            font-size: 22px;
            margin-top: 20px;
            color: #FFD700;
            font-weight: bold;
        }

        #unlockMsg {
            font-size: 14px;
            color: #ff4d4d;
            margin-top: 15px;
            background: rgba(255, 77, 77, 0.1);
            padding: 10px;
            border-radius: 5px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            margin-top: 20px;
        }

        .test-btn {
            background: #333;
            color: #FFD700;
            border: 1px solid #FFD700;
            width: 90%;
            max-width: 400px;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .test-btn:active {
            background: #FFD700;
            color: black;
        }

        #stopAdhanBtn {
            background: #8b0000;
            color: white;
            border: 1px solid #ff4d4d;
            display: none; /* Hidden by default */
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #000;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #333;
            z-index: 100;
        }

        .bottom-nav a {
            color: #FFD700;
            text-decoration: none;
            font-size: 16px;
            flex: 1;
            text-align: center;
        }
    </style>
</head>

<body>

    <h1>Prayer Times</h1>
    <p id="location">Loading Kampala times...</p>
    <div class="date" id="date">-- | --</div>

    <div id="prayerBox" class="prayer-box">
        Loading schedule...
    </div>

    <div id="countdown">
        Next prayer in: --:--:--
    </div>

    <p id="unlockMsg">⚠️ Audio Blocked: Tap anywhere to enable Adhan</p>

    <div class="btn-group">
        <button class="test-btn" onclick="testAdhan()">🔊 Test Adhan Sound</button>
        <button class="test-btn" id="stopAdhanBtn" onclick="stopAdhan()">⏹ Stop Adhan</button>
    </div>

    <!-- Adhan Audio -->
    <audio id="adhanAudio" preload="auto">
        <source src="https://cdn.islamic.network/audio/adhan/1.mp3" type="audio/mpeg">
    </audio>

    <!-- Navigation -->
    <div class="bottom-nav">
        <a href="index.html">🏠 Home</a>
        <a href="quran.html">📖 Quran</a>
        <a href="hadith.html">📜 Hadith</a>
        <a href="prayer.html">🕌 Prayer</a>
        <a href="videos.html">🎥 Videos</a>
    </div>

<script>
// =====================
// GLOBAL VARIABLES
// =====================
let prayerTimings = null;
let nextPrayerName = "";
let countdownInterval = null;
let adhanCheckInterval = null;
let lastAdhanPlayed = "";
let lastAdhanDate = "";
let audioUnlocked = false;

const adhanAudio = document.getElementById("adhanAudio");
const stopBtn = document.getElementById("stopAdhanBtn");

const KAMPALA_LAT = 0.3476;
const KAMPALA_LON = 32.5825;

// =====================
// CACHE HELPERS
// =====================
function getTodayKey() {
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

function saveToCache(data) {
    localStorage.setItem('prayerData', JSON.stringify({
        date: getTodayKey(),
        payload: data
    }));
}

function loadFromCache() {
    const cached = localStorage.getItem('prayerData');
    if (!cached) return null;
    const parsed = JSON.parse(cached);
    return (parsed.date === getTodayKey()) ? parsed.payload : null;
}

// =====================
// AUDIO UNLOCK LOGIC
// =====================
function unlockAudio() {
    if (audioUnlocked) return;
    
    // Play a silent pop to satisfy browser security
    adhanAudio.play().then(() => {
        adhanAudio.pause();
        adhanAudio.currentTime = 0;
        audioUnlocked = true;
        document.getElementById("unlockMsg").style.display = "none";
        console.log("Audio System: Active");
    }).catch(e => console.log("Unlock pending user interaction"));
}

document.body.addEventListener("click", unlockAudio, { once: true });
document.body.addEventListener("touchstart", unlockAudio, { once: true });

// =====================
// CORE ADHAN FUNCTIONS
// =====================
function triggerAdhan(prayer) {
    if (audioUnlocked) {
        adhanAudio.currentTime = 0;
        adhanAudio.play().then(() => {
            stopBtn.style.display = "block";
        }).catch(e => console.log("Adhan failed:", e));
    } else {
        alert("Time for " + prayer + "! Please tap the screen to allow audio.");
    }

    if ("Notification" in window && Notification.permission === "granted") {
        new Notification("🕌 Prayer Time", { body: "It is time for " + prayer, icon: "logo.png" });
    }

    if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
}

function stopAdhan() {
    adhanAudio.pause();
    adhanAudio.currentTime = 0;
    stopBtn.style.display = "none";
}

function testAdhan() {
    if (!audioUnlocked) {
        alert("Tap the screen first to enable audio.");
        return;
    }
    triggerAdhan("Test");
}

// =====================
// PRAYER TIME LOGIC
// =====================
function getNextPrayer(timings) {
    const prayers = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];
    const now = new Date();
    
    for (let p of prayers) {
        const [hh, mm] = timings[p].split(":");
        const pTime = new Date();
        pTime.setHours(hh, mm, 0, 0);
        if (pTime > now) return p;
    }
    return "Fajr"; // Next day
}

function displayPrayerTimes(data) {
    prayerTimings = data.timings;
    nextPrayerName = getNextPrayer(prayerTimings);

    // Display Gregorian and Hijri
    document.getElementById("date").innerHTML = 
        `${data.date.gregorian.date} | ${data.date.hijri.date} ${data.date.hijri.month.en}`;

    const prayers = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];
    let html = "";

    prayers.forEach(p => {
        const isNext = (p === nextPrayerName);
        html += `
        <div class="prayer ${isNext ? 'next' : ''}">
            <span>${p}</span>
            <span>${prayerTimings[p].slice(0, 5)}</span>
        </div>`;
    });

    document.getElementById("prayerBox").innerHTML = html;
    startCountdown();
    startAdhanChecker();
}

function startCountdown() {
    if (countdownInterval) clearInterval(countdownInterval);

    countdownInterval = setInterval(() => {
        if (!prayerTimings) return;

        const [hh, mm] = prayerTimings[nextPrayerName].split(":");
        let now = new Date();
        let pTime = new Date();
        pTime.setHours(hh, mm, 0, 0);

        if (nextPrayerName === "Fajr" && pTime < now) {
            pTime.setDate(pTime.getDate() + 1);
        }

        let diff = pTime - now;
        if (diff <= 0) {
            // Prayer time reached! Refresh UI
            loadPrayerTimes(KAMPALA_LAT, KAMPALA_LON, true);
            return;
        }

        let h = Math.floor(diff / 3600000);
        let m = Math.floor((diff % 3600000) / 60000);
        let s = Math.floor((diff % 60000) / 1000);

        document.getElementById("countdown").innerHTML = 
            `Next: ${nextPrayerName} in ${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }, 1000);
}

function startAdhanChecker() {
    if (adhanCheckInterval) clearInterval(adhanCheckInterval);

    adhanCheckInterval = setInterval(() => {
        if (!prayerTimings) return;

        const now = new Date();
        const currentTime = now.getHours().toString().padStart(2, "0") + ":" + 
                            now.getMinutes().toString().padStart(2, "0");

        if (lastAdhanDate !== now.toDateString()) {
            lastAdhanPlayed = "";
            lastAdhanDate = now.toDateString();
        }

        const prayers = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];
        prayers.forEach(p => {
            const pTime = prayerTimings[p].trim().slice(0, 5);
            if (currentTime === pTime && lastAdhanPlayed !== p) {
                triggerAdhan(p);
                lastAdhanPlayed = p;
            }
        });
    }, 20000); // Check every 20 seconds
}

async function loadPrayerTimes(lat, lon, isDefault = false) {
    const cached = loadFromCache();
    if (cached) displayPrayerTimes(cached);

    try {
        const response = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=2`);
        const result = await response.json();
        const data = result.data;
        
        displayPrayerTimes(data);
        saveToCache(data);
        document.getElementById("location").innerHTML = isDefault ? "Kampala, Uganda" : "Local Times Detected";
    } catch (e) {
        console.log("Network error, using cache.");
        if (!cached) document.getElementById("prayerBox").innerHTML = "Connection Error.";
    }
}

// =====================
// INITIALIZE
// =====================
loadPrayerTimes(KAMPALA_LAT, KAMPALA_LON, true);

if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
        loadPrayerTimes(pos.coords.latitude, pos.coords.longitude, false);
    });
}

if ("Notification" in window && Notification.permission === "default") {
    Notification.requestPermission();
}
</script>

</body>
</html>

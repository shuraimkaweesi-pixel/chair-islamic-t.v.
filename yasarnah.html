<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yasarnah - Learn Arabic Letters</title>

<style>
body{
  font-family: Arial, sans-serif;
  background: #000;
  color: #FFD700;
  margin: 0;
  padding: 20px;
  text-align: center;
}

h1{
  margin-bottom: 10px;
}

.controls{
  margin: 20px 0;
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.controls button,.controls select{
  background: #FFD700;
  color: #000;
  border: none;
  padding: 10px 16px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  font-size: 16px;
}

.controls select{
  background: #111;
  color: #FFD700;
  border: 1px solid #FFD700;
}

#progress{
  margin: 15px 0;
  font-size: 18px;
  color: #ccc;
}

#lessonBox{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  max-width: 800px;
  margin: 0 auto;
}

.lesson{
  background: #111;
  padding: 20px 15px;
  border-radius: 12px;
  transition: 0.2s;
  cursor: pointer;
  border: 2px solid transparent;
}

.lesson:hover{
  background: #1a1a1a;
  transform: scale(1.03);
}

.lesson.active{
  border: 2px solid #FFD700;
  background: rgba(255,215,0,0.1);
  box-shadow: 0 0 15px rgba(255,215,0,0.3);
}

.arabic{
  font-size: 48px;
  margin-bottom: 8px;
  font-family: 'Amiri', 'Scheherazade', serif;
  direction: rtl;
}

.name{
  font-size: 14px;
  color: #ccc;
}
</style>
</head>

<body>

<h1>📖 Yasarnah - Alif to Yaa</h1>

<div class="controls">
  <button id="playBtn" onclick="toggleSequence()">▶ Play All</button>
  <button onclick="stopLesson()">⏹ Stop</button>
  <select id="repeatSelect" onchange="repeatCount = parseInt(this.value)">
    <option value="1">Repeat 1x</option>
    <option value="3" selected>Repeat 3x</option>
    <option value="5">Repeat 5x</option>
  </select>
</div>

<div id="progress">Tap any letter to start</div>
<div id="lessonBox"></div>

<script>
// =====================
// ARABIC LETTERS
// =====================
const letters = [
  {a:"ا", name:"Alif", sound:"alif"},
  {a:"ب", name:"Ba", sound:"baa"},
  {a:"ت", name:"Ta", sound:"taa"},
  {a:"ث", name:"Tha", sound:"thaa"},
  {a:"ج", name:"Jeem", sound:"jeem"},
  {a:"ح", name:"Haa", sound:"haa"},
  {a:"خ", name:"Kha", sound:"khaa"},
  {a:"د", name:"Dal", sound:"daal"},
  {a:"ذ", name:"Dhal", sound:"dhaal"},
  {a:"ر", name:"Ra", sound:"raa"},
  {a:"ز", name:"Zay", sound:"zaay"},
  {a:"س", name:"Seen", sound:"seen"},
  {a:"ش", name:"Sheen", sound:"sheen"},
  {a:"ص", name:"Sad", sound:"saad"},
  {a:"ض", name:"Dad", sound:"daad"},
  {a:"ط", name:"Taa", sound:"taa"},
  {a:"ظ", name:"Zaa", sound:"dhaa"},
  {a:"ع", name:"Ain", sound:"ayn"},
  {a:"غ", name:"Ghain", sound:"ghayn"},
  {a:"ف", name:"Fa", sound:"faa"},
  {a:"ق", name:"Qaf", sound:"qaaf"},
  {a:"ك", name:"Kaf", sound:"kaaf"},
  {a:"ل", name:"Lam", sound:"laam"},
  {a:"م", name:"Meem", sound:"meem"},
  {a:"ن", name:"Noon", sound:"noon"},
  {a:"ه", name:"Ha", sound:"haa"},
  {a:"و", name:"Waw", sound:"waaw"},
  {a:"ي", name:"Yaa", sound:"yaa"}
];

// =====================
// BUILD UI
// =====================
const box = document.getElementById("lessonBox");
const progress = document.getElementById("progress");
const playBtn = document.getElementById("playBtn");

letters.forEach((l,i)=>{
  box.innerHTML += `
    <div class="lesson" id="letter-${i}" onclick="startLetter(${i})">
      <div class="arabic">${l.a}</div>
      <div class="name">${l.name}</div>
    </div>
  `;
});

// =====================
// AUDIO SYSTEM - Web Speech API
// =====================
let currentIndex = null;
let repeat = 0;
let repeatCount = 3;
let isPlayingSequence = false;
let isPaused = false;

// Unlock speech synthesis on first tap for mobile
function unlockSpeech(){
  if(window.speechSynthesis.speaking) return;
  const u = new SpeechSynthesisUtterance("");
  speechSynthesis.speak(u);
}
document.body.addEventListener('touchstart', unlockSpeech, {once: true});
document.body.addEventListener('click', unlockSpeech, {once: true});

// =====================
// PLAY SINGLE LETTER
// =====================
function startLetter(index){
  stopLesson();
  currentIndex = index;
  repeat = 0;
  isPlayingSequence = false;
  playCurrentLetter();
}

function playCurrentLetter(){
  if(currentIndex === null || currentIndex >= letters.length){
    stopLesson();
    return;
  }

  const letter = letters[currentIndex];
  highlightLetter(currentIndex);
  updateProgress();

  // Stop any previous speech
  speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(letter.a);
  utterance.lang = 'ar-SA';
  utterance.rate = 0.7; // Slower for learning
  utterance.pitch = 1;

  utterance.onend = () => {
    if(!isPlayingSequence &&!isPaused){
      // Single letter mode - just stop
      setTimeout(() => {
        document.querySelectorAll(".lesson").forEach(l => l.classList.remove("active"));
      }, 300);
      return;
    }

    if(isPaused) return;

    repeat++;
    if(repeat < repeatCount){
      setTimeout(playCurrentLetter, 500); // Pause between repeats
    } else {
      currentIndex++;
      repeat = 0;
      if(currentIndex < letters.length && isPlayingSequence){
        setTimeout(playCurrentLetter, 800); // Pause between letters
      } else {
        stopLesson();
        progress.textContent = "✅ Finished all letters!";
      }
    }
  };

  utterance.onerror = () => {
    console.log("Speech error for", letter.name);
    // Skip to next if error
    if(isPlayingSequence){
      currentIndex++;
      repeat = 0;
      setTimeout(playCurrentLetter, 300);
    }
  };

  speechSynthesis.speak(utterance);
}

// =====================
// SEQUENCE CONTROL
// =====================
function toggleSequence(){
  if(isPlayingSequence &&!isPaused){
    // Pause
    speechSynthesis.pause();
    isPaused = true;
    playBtn.textContent = "▶ Resume";
  } else if(isPaused){
    // Resume
    speechSynthesis.resume();
    isPaused = false;
    playBtn.textContent = "⏸ Pause";
  } else {
    // Start from beginning
    stopLesson();
    currentIndex = 0;
    repeat = 0;
    isPlayingSequence = true;
    playBtn.textContent = "⏸ Pause";
    playCurrentLetter();
  }
}

function stopLesson(){
  speechSynthesis.cancel();
  isPlayingSequence = false;
  isPaused = false;
  currentIndex = null;
  repeat = 0;
  playBtn.textContent = "▶ Play All";
  document.querySelectorAll(".lesson").forEach(l => l.classList.remove("active"));
  progress.textContent = "Tap any letter to start";
}

// =====================
// UI HELPERS
// =====================
function highlightLetter(index){
  document.querySelectorAll(".lesson").forEach((el,i)=>{
    el.classList.toggle("active", i === index);
  });

  // Scroll into view on mobile
  const activeEl = document.getElementById(`letter-${index}`);
  if(activeEl){
    activeEl.scrollIntoView({behavior:"smooth", block:"center"});
  }
}

function updateProgress(){
  if(currentIndex!== null){
    progress.textContent = `Letter ${currentIndex + 1}/28 - ${letters[currentIndex].name} - Repeat ${repeat + 1}/${repeatCount}`;
  }
}
</script>

</body>
</html>

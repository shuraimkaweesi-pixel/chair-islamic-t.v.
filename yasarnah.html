<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yasarnah - Learn Arabic Letters</title>

<style>
body{
font-family:Arial;
background:#0f0f0f;
color:#FFD700;
margin:0;
padding:20px;
padding-bottom:90px;
text-align:center;
}

h1{
margin-bottom:10px;
color:#FFD700;
}

#status{
margin-bottom:20px;
color:#999;
font-size:14px;
min-height:20px;
}

#lessonBox{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
max-width:500px;
margin:0 auto;
}

.lesson{
background:#1a1a1a;
padding:15px 5px;
border-radius:12px;
transition:0.2s;
cursor:pointer;
border:2px solid transparent;
}

.lesson:active{
transform:scale(0.95);
}

.lesson.active{
border:2px solid gold;
background:#252525;
box-shadow:0 0 15px rgba(255,215,0,0.3);
}

.arabic{
font-size:44px;
margin-bottom:5px;
line-height:1;
}

.name{
font-size:12px;
color:#ddd;
}

.controls{
margin-top:25px;
}

button{
background:#FFD700;
color:black;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
font-size:15px;
margin:5px;
}

button:active{
background:#e6c200;
}

.debug{
margin-top:15px;
font-size:12px;
color:#666;
}
</style>
</head>

<body>

<h1>📖 Yasarnah (Alif → Yaa)</h1>
<p id="status">Tap any letter to hear it</p>

<div id="lessonBox"></div>

<div class="controls">
<button onclick="stopLesson()">⏸ Stop</button>
<button onclick="playAll()">▶ Play All</button>
<button onclick="testVoice()">🔊 Test Voice</button>
</div>

<div class="debug" id="debug"></div>

<script>
// =====================
// LETTERS
// =====================
const letters = [
{a:"ا", name:"Alif", sound:"alif"}, {a:"ب", name:"Ba", sound:"baa"}, 
{a:"ت", name:"Ta", sound:"taa"}, {a:"ث", name:"Tha", sound:"thaa"},
{a:"ج", name:"Jeem", sound:"jeem"}, {a:"ح", name:"Ha", sound:"haa"}, 
{a:"خ", name:"Kha", sound:"khaa"}, {a:"د", name:"Dal", sound:"daal"},
{a:"ذ", name:"Dhal", sound:"dhaal"}, {a:"ر", name:"Ra", sound:"raa"}, 
{a:"ز", name:"Zay", sound:"zaay"}, {a:"س", name:"Seen", sound:"seen"},
{a:"ش", name:"Sheen", sound:"sheen"}, {a:"ص", name:"Sad", sound:"saad"}, 
{a:"ض", name:"Dad", sound:"daad"}, {a:"ط", name:"Taa", sound:"taa"},
{a:"ظ", name:"Zaa", sound:"zaa"}, {a:"ع", name:"Ain", sound:"ayn"}, 
{a:"غ", name:"Ghain", sound:"ghayn"}, {a:"ف", name:"Fa", sound:"faa"},
{a:"ق", name:"Qaf", sound:"qaaf"}, {a:"ك", name:"Kaf", sound:"kaaf"}, 
{a:"ل", name:"Lam", sound:"laam"}, {a:"م", name:"Meem", sound:"meem"},
{a:"ن", name:"Noon", sound:"noon"}, {a:"ه", name:"Ha", sound:"haa"}, 
{a:"و", name:"Waw", sound:"waaw"}, {a:"ي", name:"Yaa", sound:"yaa"}
];

// =====================
// SETTINGS
// =====================
let repeatCount = 3;
let currentIndex = null;
let repeat = 0;
let isPlaying = false;
let speech = window.speechSynthesis;
let voices = [];
let hasArabicVoice = false;

// =====================
// BUILD UI
// =====================
const box = document.getElementById("lessonBox");
letters.forEach((l,i)=>{
  box.innerHTML += `
  <div class="lesson" onclick="startLetter(${i})">
    <div class="arabic">${l.a}</div>
    <div class="name">${l.name}</div>
  </div>
  `;
});

// =====================
// LOAD VOICES + DEBUG
// =====================
function loadVoices() {
  voices = speech.getVoices();
  const arabicVoices = voices.filter(v => v.lang.startsWith('ar'));
  hasArabicVoice = arabicVoices.length > 0;
  
  document.getElementById("debug").innerText = 
    `Voices: ${voices.length} | Arabic: ${arabicVoices.length} | Using: ${hasArabicVoice ? 'Arabic' : 'English fallback'}`;
  
  console.log("Available voices:", voices.map(v => v.lang + " " + v.name));
}

speech.onvoiceschanged = loadVoices;
setTimeout(loadVoices, 100); // Force load

// =====================
// TEST VOICE BUTTON
// =====================
function testVoice() {
  speak("Alif", () => {
    document.getElementById("status").innerText = "Voice test done. Tap a letter now.";
  });
  document.getElementById("status").innerText = "Testing voice...";
}

// =====================
// SPEECH WITH FALLBACK
// =====================
function speak(letterObj, callback) {
  if (speech.speaking) speech.cancel();

  const utter = new SpeechSynthesisUtterance();
  
  // Try Arabic first, fallback to English pronunciation
  if (hasArabicVoice) {
    utter.text = letterObj.a; // Speak the actual Arabic letter
    utter.lang = 'ar-SA';
  } else {
    utter.text = letterObj.sound; // Speak "baa", "taa" etc in English
    utter.lang = 'en-US';
  }
  
  utter.rate = 0.7; // Slower for learning
  utter.volume = 1;
  
  utter.onend = callback;
  utter.onerror = (e) => {
    console.log("Speech error:", e);
    document.getElementById("status").innerText = "Voice failed. Try Test Voice button first.";
    isPlaying = false;
  };

  speech.speak(utter);
}

// =====================
// CONTROLS
// =====================
function setRepeat(num) {
  repeatCount = num;
  document.getElementById("status").innerText = `Repeat set to ${num}x`;
}

function stopLesson(){
  speech.cancel();
  isPlaying = false;
  currentIndex = null;
  repeat = 0;
  document.querySelectorAll(".lesson").forEach(l=>{
    l.classList.remove("active");
  });
  document.getElementById("status").innerText = "Stopped";
}

function playAll() {
  stopLesson();
  currentIndex = 0;
  repeat = 0;
  isPlaying = true;
  playLetter();
}

// =====================
// START / TOGGLE
// =====================
function startLetter(index){
  if(currentIndex === index && isPlaying){
    speech.cancel();
    isPlaying = false;
    document.getElementById("status").innerText = "Paused";
    document.querySelectorAll(".lesson")[index].classList.remove("active");
    return;
  }

  stopLesson();
  currentIndex = index;
  repeat = 0;
  isPlaying = true;
  playLetter();
}

// =====================
// PLAY LETTER
// =====================
function playLetter(){
  if (!isPlaying || currentIndex === null || currentIndex >= letters.length) {
    stopLesson();
    document.getElementById("status").innerText = "Finished! Alhamdulillah";
    return;
  }

  const letter = letters[currentIndex];
  document.getElementById("status").innerText = `Playing: ${letter.name} (${repeat + 1}/${repeatCount})`;
  highlight(currentIndex);

  speak(letter, () => {
    if (!isPlaying) return;
    
    repeat++;
    if(repeat < repeatCount){
      setTimeout(() => playLetter(), 400);
      return;
    }

    currentIndex++;
    repeat = 0;
    setTimeout(() => playLetter(), 600);
  });
}

// =====================
// HIGHLIGHT
// =====================
function highlight(index){
  document.querySelectorAll(".lesson").forEach((el,i)=>{
    el.classList.toggle("active", i === index);
  });
}
</script>

</body>
</html>

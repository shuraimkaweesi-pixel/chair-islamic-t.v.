<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CHAIR ISLAMIC TV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b3d2e;
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      background: #06251c;
      color: #d4af37;
    }

    .chat-container {
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background: #083a2c;
      border-radius: 12px;
    }

    #chatBox {
      text-align: left;
      height: 300px;
      overflow-y: auto;
      background: #06251c;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    input {
      width: 70%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px 15px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: #d4af37;
      color: #0b3d2e;
      font-weight: bold;
    }

    button:hover {
      background: white;
    }
  </style>
</head>

<body>

  <header>CHAIR ISLAMIC TV</header>

  <div class="chat-container">
    <h2>Ask Anything About Islam</h2>

    <div id="chatBox"></div>

    <input type="text" id="userInput" placeholder="Type your question here..." />
    <button onclick="sendMessage()">Send</button>
  </div>

  <script>
    async function sendMessage() {
      const input = document.getElementById("userInput");
      const message = input.value.trim();

      if (!message) return;

      const chatBox = document.getElementById("chatBox");
      chatBox.innerHTML += "<p><strong>You:</strong> " + message + "</p>";

      input.value = "";

      chatBox.innerHTML += "<p><em>Thinking...</em></p>";

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        const data = await response.json();

        // Remove "Thinking..."
        chatBox.innerHTML = chatBox.innerHTML.replace("<p><em>Thinking...</em></p>", "");

        if (data.reply) {
          chatBox.innerHTML += "<p><strong>AI:</strong> " + data.reply + "</p>";
        } else {
          chatBox.innerHTML += "<p style='color:red;'>Error: " + (data.error || "Something went wrong") + "</p>";
        }

        chatBox.scrollTop = chatBox.scrollHeight;

      } catch (error) {
        chatBox.innerHTML += "<p style='color:red;'>Failed to connect to AI.</p>";
      }
    }
  </script>

</body>
</html>

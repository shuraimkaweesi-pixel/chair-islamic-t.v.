<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yasarnah - Learn Arabic Letters</title>

<style>
body{
font-family:Arial;
background:#0f0f0f;
color:#FFD700;
margin:0;
padding:20px;
padding-bottom:90px;
text-align:center;
}

h1{margin-bottom:10px;color:#FFD700;}
#status{margin-bottom:20px;color:#999;font-size:14px;min-height:20px;}

#lessonBox{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
max-width:500px;
margin:0 auto;
}

.lesson{
background:#1a1a1a;
padding:15px 5px;
border-radius:12px;
transition:0.2s;
cursor:pointer;
border:2px solid transparent;
}

.lesson:active{transform:scale(0.95);}
.lesson.active{
border:2px solid gold;
background:#252525;
box-shadow:0 0 15px rgba(255,215,0,0.3);
}

.arabic{font-size:44px;margin-bottom:5px;line-height:1;}
.name{font-size:12px;color:#ddd;}

.controls{margin-top:25px;}

button{
background:#FFD700;
color:black;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
font-size:15px;
margin:5px;
}
button:active{background:#e6c200;}
</style>
</head>

<body>

<h1>📖 Yasarnah (Alif → Yaa)</h1>
<p id="status">Tap any letter to hear it</p>

<div id="lessonBox"></div>

<div class="controls">
<button onclick="stopLesson()">⏸ Stop</button>
<button onclick="playAll()">▶ Play All</button>
<button onclick="setRepeat(1)">1x</button>
<button onclick="setRepeat(3)">3x</button>
</div>

<script>
// =====================
// LETTERS WITH YOUR MP3 PATHS - UPDATED TO blog/
// =====================
const letters = [
{a:"ا", name:"Alif", file:"blog/alif.mp3"},
{a:"ب", name:"Ba", file:"blog/baa.mp3"},
{a:"ت", name:"Ta", file:"blog/taa.mp3"},
{a:"ث", name:"Tha", file:"blog/thaa.mp3"},
{a:"ج", name:"Jim", file:"blog/jeem.mp3"},
{a:"ح", name:"Ha", file:"blog/haa.mp3"},
{a:"خ", name:"Kha", file:"blog/khaa.mp3"},
{a:"د", name:"Dal", file:"blog/daal.mp3"},
{a:"ذ", name:"Dhal", file:"blog/dhaal.mp3"},
{a:"ر", name:"Ra", file:"blog/raa.mp3"},
{a:"ز", name:"Zay", file:"blog/zaay.mp3"},
{a:"س", name:"Sin", file:"blog/seen.mp3"},
{a:"ش", name:"Shin", file:"blog/sheen.mp3"},
{a:"ص", name:"Swad", file:"blog/saad.mp3"},
{a:"ض", name:"Dthwad", file:"blog/daad.mp3"},
{a:"ط", name:"Twaa", file:"blog/twa.mp3"},
{a:"ظ", name:"thwa", file:"blog/thwa.mp3"},
{a:"ع", name:"Ain", file:"blog/ayn.mp3"},
{a:"غ", name:"Ghain", file:"blog/ghayn.mp3"},
{a:"ف", name:"Fa", file:"blog/faa.mp3"},
{a:"ق", name:"Qaf", file:"blog/qaaf.mp3"},
{a:"ك", name:"Kaf", file:"blog/kaaf.mp3"},
{a:"ل", name:"Lam", file:"blog/laam.mp3"},
{a:"م", name:"Mim", file:"blog/meem.mp3"},
{a:"ن", name:"Noon", file:"blog/noon.mp3"},
{a:"ه", name:"HHa", file:"blog/hha.mp3"},
{a:"و", name:"Waw", file:"blog/waaw.mp3"},
{a:"ي", name:"Yaa", file:"blog/yaa.mp3"}
];

// =====================
// SETTINGS
// =====================
let repeatCount = 3;
let currentAudio = null;
let currentIndex = null;
let repeat = 0;
let isPlaying = false;
let audioUnlocked = false;

// =====================
// BUILD UI
// =====================
const box = document.getElementById("lessonBox");
letters.forEach((l,i)=>{
  box.innerHTML += `
  <div class="lesson" onclick="startLetter(${i})">
    <div class="arabic">${l.a}</div>
    <div class="name">${l.name}</div>
  </div>
  `;
});

// =====================
// AUDIO UNLOCK - FOR CHROME
// =====================
function unlockAudio() {
  if (audioUnlocked) return Promise.resolve(true);

  const testAudio = new Audio();
  testAudio.volume = 0;
  testAudio.src = letters[0].file;

  return testAudio.play().then(() => {
    testAudio.pause();
    audioUnlocked = true;
    document.getElementById("status").innerText = "Audio ready. Tap any letter.";
    return true;
  }).catch(e => {
    console.log("Unlock failed:", e);
    document.getElementById("status").innerText = "Tap again to enable audio";
    return false;
  });
}

// Unlock on any tap
document.body.addEventListener("click", unlockAudio, {once: true});
document.body.addEventListener("touchstart", unlockAudio, {once: true});

// =====================
// CONTROLS
// =====================
function setRepeat(num) {
  repeatCount = num;
  document.getElementById("status").innerText = `Repeat set to ${num}x`;
}

function stopLesson(){
  if(currentAudio){
    currentAudio.pause();
    currentAudio = null;
  }
  isPlaying = false;
  currentIndex = null;
  repeat = 0;
  document.querySelectorAll(".lesson").forEach(l=>{
    l.classList.remove("active");
  });
  document.getElementById("status").innerText = "Stopped";
}

function playAll() {
  stopLesson();
  currentIndex = 0;
  repeat = 0;
  isPlaying = true;
  playLetter();
}

// =====================
// START / TOGGLE
// =====================
async function startLetter(index){
  if (!audioUnlocked) {
    const unlocked = await unlockAudio();
    if (!unlocked) return;
  }

  if(currentIndex === index && isPlaying && currentAudio){
    currentAudio.pause();
    isPlaying = false;
    document.getElementById("status").innerText = "Paused";
    document.querySelectorAll(".lesson")[index].classList.remove("active");
    return;
  }

  stopLesson();
  currentIndex = index;
  repeat = 0;
  isPlaying = true;
  playLetter();
}

// =====================
// PLAY LETTER
// =====================
function playLetter(){
  if (!isPlaying || currentIndex === null || currentIndex >= letters.length) {
    stopLesson();
    document.getElementById("status").innerText = "Finished! Alhamdulillah";
    return;
  }

  const letter = letters[currentIndex];
  document.getElementById("status").innerText = `Playing: ${letter.name} (${repeat + 1}/${repeatCount})`;
  highlight(currentIndex);

  currentAudio = new Audio(letter.file);

  currentAudio.onended = () => {
    if (!isPlaying) return;

    repeat++;
    if(repeat < repeatCount){
      setTimeout(() => playLetter(), 300);
      return;
    }

    currentIndex++;
    repeat = 0;
    setTimeout(() => playLetter(), 600);
  };

  currentAudio.onerror = () => {
    document.getElementById("status").innerText = `Error: ${letter.file} not found`;
    isPlaying = false;
  };

  currentAudio.play().catch(e => {
    console.log("Play error:", e);
    document.getElementById("status").innerText = "Tap again to enable audio";
    isPlaying = false;
  });
}

// =====================
// HIGHLIGHT
// =====================
function highlight(index){
  document.querySelectorAll(".lesson").forEach((el,i)=>{
    el.classList.toggle("active", i === index);
  });
}
</script>

</body>
</html>

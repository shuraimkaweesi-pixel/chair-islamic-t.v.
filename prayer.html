<body>

<h1>Prayer Times</h1>

<p id="location">Detecting location...</p>

<div class="date" id="date"></div>

<div id="prayerBox" class="prayer-box">
Loading prayer times...
</div>

<div id="countdown">
Next prayer in: --:--:--
</div>

<!-- Navigation -->

<div class="bottom-nav">

<a href="index.html">🏠 Home</a>

<a href="hadith.html">📜 Hadith</a>

<a href="videos.html">🎥 Videos</a>

</div>

<script>

// =====================
// PRAYER VARIABLES
// =====================

let prayerTimings = null;
let nextPrayerName = "";
let countdownInterval = null;


// =====================
// GET NEXT PRAYER
// =====================

function getNextPrayer(timings){

const prayers = ["Fajr","Dhuhr","Asr","Maghrib","Isha"];

const now = new Date();

let next = null;

for(let p of prayers){

const time = timings[p].split(":");

const prayerTime = new Date();

prayerTime.setHours(time[0], time[1], 0, 0);

if(prayerTime > now){

next = p;

break;

}

}

if(!next) next = "Fajr";

return next;

}


// =====================
// DISPLAY PRAYERS
// =====================

function displayPrayerTimes(data){

prayerTimings = data.data.timings;

const date = data.data.date;

nextPrayerName = getNextPrayer(prayerTimings);

document.getElementById("date").innerHTML =
`${date.gregorian.date} | ${date.hijri.date} ${date.hijri.month.en}`;


const prayers = ["Fajr","Dhuhr","Asr","Maghrib","Isha"];

let html = "";

prayers.forEach(p=>{

const cls = p === nextPrayerName ? "prayer next" : "prayer";

html += `<div class="${cls}">
<span>${p}</span>
<span>${prayerTimings[p]}</span>
</div>`;

});

document.getElementById("prayerBox").innerHTML = html;

startCountdown();

}


// =====================
// LOAD PRAYER TIMES
// =====================

function loadPrayerTimes(lat,lon){

fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=2`)

.then(res=>res.json())

.then(data=>{

displayPrayerTimes(data);

})

.catch(()=>{

document.getElementById("prayerBox").innerHTML="Could not load prayer times.";

});

}


// =====================
// GET USER LOCATION
// =====================

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(position=>{

const lat = position.coords.latitude;

const lon = position.coords.longitude;

document.getElementById("location").innerHTML = "Your location detected";

loadPrayerTimes(lat,lon);

},()=>{

document.getElementById("location").innerHTML="Using default location Kampala";

loadPrayerTimes(0.3476,32.5825);

});

}else{

loadPrayerTimes(0.3476,32.5825);

}


// =====================
// COUNTDOWN TIMER
// =====================

function startCountdown(){

if(countdownInterval) clearInterval(countdownInterval);

countdownInterval = setInterval(()=>{

if(!prayerTimings) return;

let timeStr = prayerTimings[nextPrayerName];

let parts = timeStr.split(":");

let now = new Date();

let prayerTime = new Date();

prayerTime.setHours(parts[0], parts[1], 0, 0);

if(nextPrayerName === "Fajr" && prayerTime < now){

prayerTime.setDate(prayerTime.getDate()+1);

}

let diff = prayerTime - now;

if(diff < 0){

nextPrayerName = getNextPrayer(prayerTimings);

return;

}

let hours = Math.floor(diff/1000/3600);

let minutes = Math.floor((diff/1000%3600)/60);

let seconds = Math.floor((diff/1000)%60);

document.getElementById("countdown").innerHTML =
`Next prayer (${nextPrayerName}) in: ${hours.toString().padStart(2,"0")}:${minutes.toString().padStart(2,"0")}:${seconds.toString().padStart(2,"0")}`;

},1000);

}

</script>

</body>

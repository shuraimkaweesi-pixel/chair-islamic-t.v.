<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chair Islamic TV</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFD700">
<link rel="apple-touch-icon" href="logo.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#0f0f0f;
color:#FFD700;
font-family:Arial, sans-serif;
text-align:center;
padding:20px;
padding-bottom:90px;
}

.container{max-width:900px;margin:auto;}

h1,h2{margin-bottom:10px;}

p{color:#ddd;margin-bottom:10px;}

.content-box{
background:#1a1a1a;
padding:20px;
border-radius:10px;
margin-top:20px;
}

button{
width:90%;
max-width:400px;
padding:14px;
margin:10px auto;
background:#FFD700;
color:black;
font-weight:bold;
border:none;
border-radius:8px;
cursor:pointer;
display:block;
}

input{
width:70%;
padding:10px;
margin:10px auto;
border-radius:6px;
border:none;
text-align:center;
display:block;
}

iframe{
width:100%;
height:220px;
border:none;
border-radius:8px;
margin-top:10px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#000;
display:flex;
justify-content:space-around;
padding:10px 0;
}

.bottom-nav a{
color:#FFD700;
text-decoration:none;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>Chair Islamic TV</h1>
<p>Islamic Knowledge • Quran • Hadith • Videos</p>

<!-- INSTALL BUTTON -->
<button id="installBtn" style="display:none;">
Install App 📲
</button>

<!-- BIO -->
<div class="content-box">
<h2>Founder</h2>
<p><b>KAWEESI SHURAIM</b></p>
<p>Masajja, Kampala</p>
</div>

<!-- DONATION -->
<div class="content-box">
<h2>Support Us</h2>

<input type="number" id="amount" placeholder="Enter amount (UGX)">

<button onclick="donate()">Donate via Airtel</button>

</div>

<!-- FEATURES -->
<div class="content-box">
<h2>Explore</h2>

<a href="quran.html"><button>📖 Quran</button></a>
<a href="hadith.html"><button>📜 Hadith</button></a>
<a href="prayer.html"><button>🕌 Prayer</button></a>
<a href="videos.html"><button>🎥 Videos</button></a>

</div>

<!-- VIDEOS -->
<div id="youtubeVideos"></div>

</div>

<!-- NAV -->
<div class="bottom-nav">
<a href="index.html">Home</a>
<a href="quran.html">Quran</a>
<a href="hadith.html">Hadith</a>
<a href="prayer.html">Prayer</a>
<a href="videos.html">Videos</a>
</div>

<script>
// ===============================
// PWA INSTALL
// ===============================
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e)=>{
e.preventDefault();
deferredPrompt = e;

const btn = document.getElementById("installBtn");
btn.style.display = "block";

btn.onclick = async ()=>{
deferredPrompt.prompt();
await deferredPrompt.userChoice;
deferredPrompt = null;
};
});

// ===============================
// YOUTUBE
// ===============================
const vids = ["ZGwG7UBlFCc","zGIBIOMA0PQ"];
const box = document.getElementById("youtubeVideos");

if(box){
let html="";
vids.forEach(v=>{
html += `<iframe src="https://www.youtube.com/embed/${v}" allowfullscreen></iframe>`;
});
box.innerHTML = html;
}

// ===============================
// DONATION (AUTO USSD)
// ===============================
function donate(){

const amount = document.getElementById("amount").value;

if(!amount || amount < 1000){
alert("Enter valid amount (min 1000)");
return;
}

// AUTO DIAL WITH MERCHANT CODE
const ussd = `*185*9*7037856*${amount}#`;

window.location.href = "tel:" + encodeURIComponent(ussd);

}

// ===============================
// SERVICE WORKER
// ===============================
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js")
.then(()=>console.log("SW Registered"))
.catch(()=>console.log("SW Failed"));
}

</script>

</body>
</html>

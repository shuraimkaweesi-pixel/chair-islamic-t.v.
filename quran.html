<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quran Reader | Chair Islamic TV</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFD700">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="apple-touch-icon" href="logo.png">

<link rel="stylesheet" href="styles.css">

<style>
/* Quran styles */
.ayah { margin-bottom:15px; padding:10px; border-bottom:1px solid #333; }
.arabic { font-size:24px; direction:rtl; text-align:right; color:#fff; }
.translation { font-size:18px; text-align:left; color:#ddd; }
#quranText { margin-top:20px; }

/* Top Controls */
.controls { margin-bottom:20px; }
.controls input, .controls select { padding:8px; margin-right:8px; }

/* Bottom Nav */
.bottom-nav{ position:fixed; bottom:0; left:0; width:100%; background:#000; display:flex; justify-content:space-around; padding:12px 0; border-top:1px solid #333; }
.bottom-nav a{ color:#FFD700; text-decoration:none; font-size:14px; flex:1; text-align:center; }
.bottom-nav a:hover{ color:white; }

/* AI Search Box */
.ai-search { margin-top:20px; }
.ai-search input { width:70%; padding:8px; margin-right:8px; }
.ai-search button { padding:8px 12px; }
#aiQuranAnswer { margin-top:15px; color:#FFD700; }
</style>
</head>
<body>

<div class="container">

<h1>📖 Quran Reader</h1>

<div class="controls">
<input type="text" id="surahSearch" placeholder="Search Surah..." oninput="searchSurah()">
<select id="surahSelect"></select>
<select id="reciterSelect">
  <option value="afasy">Abu Bakr Al-Afasy</option>
  <option value="baset">Mishary Al-Baset</option>
  <option value="ghamdi">Saad Al-Ghamdi</option>
</select>
<button onclick="loadSurah()">Load Surah</button>
</div>

<div id="audioPlayer"></div>

<div id="quranText"></div>

<!-- AI Quran Search -->
<div class="ai-search">
<h2>🤖 Quran AI Search</h2>
<input id="quranAIQuestion" placeholder="Ask about a verse or topic...">
<button onclick="askQuranAI()">Ask</button>
<div id="aiQuranAnswer"></div>
</div>

</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
<a href="index.html">🏠 Home</a>
<a href="quran.html">📖 Quran</a>
<a href="hadith.html">📜 Hadith</a>
<a href="prayer.html">🕌 Prayer</a>
<a href="videos.html">🎥 Videos</a>
</div>

<script>
// ===============================
// SURAH LIST
// ===============================
const surahNames = [
"Al-Fatiha","Al-Baqarah","Aal-Imran","An-Nisa","Al-Ma'idah","Al-An'am","Al-A'raf","Al-Anfal","At-Tawbah","Yunus",
"Hud","Yusuf","Ar-Ra'd","Ibrahim","Al-Hijr","An-Nahl","Al-Isra","Al-Kahf","Maryam","Ta-Ha",
"Al-Anbiya","Al-Hajj","Al-Mu’minun","An-Nur","Al-Furqan","Ash-Shu'ara","An-Naml","Al-Qasas","Al-Ankabut","Ar-Rum",
"Luqman","As-Sajdah","Al-Ahzab","Saba","Fatir","Ya-Sin","As-Saffat","Sad","Az-Zumar","Ghafir",
"Fussilat","Ash-Shura","Az-Zukhruf","Ad-Dukhan","Al-Jathiyah","Al-Ahqaf","Muhammad","Al-Fath","Al-Hujurat","Qaf",
"Adh-Dhariyat","At-Tur","An-Najm","Al-Qamar","Ar-Rahman","Al-Waqi'ah","Al-Hadid","Al-Mujadila","Al-Hashr","Al-Mumtahanah",
"As-Saff","Al-Jumu’ah","Al-Munafiqun","At-Taghabun","At-Talaq","At-Tahrim","Al-Mulk","Al-Qalam","Al-Haqqah","Al-Ma'arij",
"Nuh","Al-Jinn","Al-Muzzammil","Al-Muddathir","Al-Qiyamah","Al-Insan","Al-Mursalat","An-Naba","An-Nazi'at","Abasa",
"At-Takwir","Al-Infitar","Al-Mutaffifin","Al-Inshiqaq","Al-Buruj","At-Tariq","Al-A'la","Al-Ghashiyah","Al-Fajr","Al-Balad",
"Ash-Shams","Al-Layl","Ad-Duha","Ash-Sharh","At-Tin","Al-Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah","Al-Adiyat",
"Al-Qari'ah","At-Takathur","Al-Asr","Al-Humazah","Al-Fil","Quraysh","Al-Ma'un","Al-Kawthar","Al-Kafirun","An-Nasr",
"Al-Masad","Al-Ikhlas","Al-Falaq","An-Nas"
];

// Populate Surah dropdown
const surahSelect = document.getElementById("surahSelect");
surahNames.forEach((name,i)=>{
  let option=document.createElement("option");
  option.value=i+1;
  option.textContent=(i+1)+" - "+name;
  surahSelect.appendChild(option);
});

// Search Surah
function searchSurah(){
  const input=document.getElementById("surahSearch").value.toLowerCase();
  for(let i=0;i<surahSelect.options.length;i++){
    const txt=surahSelect.options[i].text.toLowerCase();
    surahSelect.options[i].style.display= txt.includes(input) ? "block":"none";
  }
}

// Load Surah
async function loadSurah() {
  const surahNumber = parseInt(document.getElementById("surahSelect").value);
  if (!surahNumber) { alert("Please select a Surah"); return; }

  try {
    const [arabicRes, englishRes] = await Promise.all([
      fetch("quran.json"),
      fetch("quran_en.json")
    ]);

    if (!arabicRes.ok || !englishRes.ok) throw new Error("Quran JSON files not found");

    const arabicData = await arabicRes.json();
    const englishData = await englishRes.json();

    const arabicSurah = arabicData[surahNumber-1] || arabicData.data?.surahs?.[surahNumber-1] || arabicData.surahs?.[surahNumber-1];
    const englishSurah = englishData[surahNumber-1] || englishData.data?.surahs?.[surahNumber-1] || englishData.surahs?.[surahNumber-1];

    if (!arabicSurah) throw new Error("Arabic Surah not found");

    const arabicAyahs = arabicSurah.ayahs || arabicSurah.verses || [];
    const englishAyahs = englishSurah?.ayahs || englishSurah?.verses || [];

    let html = "";
    for (let i = 0; i < arabicAyahs.length; i++) {
      const arabicText = arabicAyahs[i].text || arabicAyahs[i].ayah || "";
      const englishText = englishAyahs[i]?.translation || englishAyahs[i]?.text || "Translation unavailable";
      html += `<div class="ayah"><div class="arabic">${i+1}. ${arabicText}</div><div class="translation">${i+1}. ${englishText}</div></div>`;
    }
    document.getElementById("quranText").innerHTML = html;

    // AUDIO PLAYER
    const reciter = document.getElementById("reciterSelect").value;
    const reciters = {
      afasy: "https://server8.mp3quran.net/afs/",
      baset: "https://server8.mp3quran.net/bas/",
      ghamdi: "https://server7.mp3quran.net/s_gmd/"
    };
    const surahCode = String(surahNumber).padStart(3,"0");
    document.getElementById("audioPlayer").innerHTML = `<audio controls><source src="${reciters[reciter]}${surahCode}.mp3" type="audio/mpeg"></audio>`;
  } catch (err) {
    console.error(err);
    document.getElementById("quranText").innerHTML = "<p style='color:red'>Failed to load Surah. Check Quran JSON files.</p>";
  }
}

// ===============================
// Quran AI Search
// ===============================
async function askQuranAI() {
  const question = document.getElementById("quranAIQuestion").value;
  if (!question) return;

  try {
    const res = await fetch("/api/quran-search-ai",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({question})
    });
    const data = await res.json();
    document.getElementById("aiQuranAnswer").innerText = data.answer || "No answer found.";
  } catch(err) {
    console.error(err);
    document.getElementById("aiQuranAnswer").innerText = "AI failed to respond.";
  }
}
</script>

</body>
</html>

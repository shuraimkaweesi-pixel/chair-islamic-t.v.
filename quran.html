<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chair Islamic TV - Quran</title>

<style>

body {
  font-family: Arial;
  margin: 0;
  background: #000;
  color: #FFD700;
}

h1 {
  text-align: center;
  margin: 20px 0;
}

#quranControls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin-bottom: 20px;
}

input, select, button {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #FFD700;
  background: #000;
  color: #FFD700;
}

#quranText {
  padding: 10px 20px;
}

.ayah {
  padding: 12px;
  margin-bottom: 10px;
  cursor: pointer;
}

.arabic {
  font-size: 26px;
  text-align: right;
  direction: rtl;
}

.translation {
  font-size: 16px;
}

.playing {
  background: rgba(139,69,19,0.3);
  border-left: 4px solid #FFD700;
}

/* Floating download */
#downloadBtn {
  position: fixed;
  bottom: 15px;
  right: 15px;
  background: gold;
  color: black;
  padding: 12px;
  border-radius: 50px;
}

</style>
</head>

<body>

<h1>Quran - Chair Islamic TV</h1>

<div id="quranControls">
<input id="surahSearch" placeholder="Search Surah">
<select id="surahSelect"></select>

<select id="reciterSelect">
<option value="Alafasy_128kbps">Alafasy</option>
<option value="Abdul_Basit_Murattal_128kbps">Abdul Basit</option>
<option value="Ghamdi_40kbps">Ghamdi</option>
</select>

<button onclick="loadSurah()">Load Surah</button>
</div>

<div id="quranText"></div>

<button id="downloadBtn" onclick="downloadSurah()">⬇️</button>

<script>

// =====================
// SURAH LIST
// =====================

const surahNames = ["Al-Fatiha","Al-Baqarah","Aal-Imran","An-Nisa","Al-Ma'idah","Al-An'am","Al-A'raf","Al-Anfal","At-Tawbah","Yunus","Hud","Yusuf","Ar-Ra'd","Ibrahim","Al-Hijr","An-Nahl","Al-Isra","Al-Kahf","Maryam","Ta-Ha","Al-Anbiya","Al-Hajj","Al-Mu’minun","An-Nur","Al-Furqan","Ash-Shu'ara","An-Naml","Al-Qasas","Al-Ankabut","Ar-Rum","Luqman","As-Sajdah","Al-Ahzab","Saba","Fatir","Ya-Sin","As-Saffat","Sad","Az-Zumar","Ghafir","Fussilat","Ash-Shura","Az-Zukhruf","Ad-Dukhan","Al-Jathiyah","Al-Ahqaf","Muhammad","Al-Fath","Al-Hujurat","Qaf","Adh-Dhariyat","At-Tur","An-Najm","Al-Qamar","Ar-Rahman","Al-Waqi'ah","Al-Hadid","Al-Mujadila","Al-Hashr","Al-Mumtahanah","As-Saff","Al-Jumu’ah","Al-Munafiqun","At-Taghabun","At-Talaq","At-Tahrim","Al-Mulk","Al-Qalam","Al-Haqqah","Al-Ma'arij","Nuh","Al-Jinn","Al-Muzzammil","Al-Muddathir","Al-Qiyamah","Al-Insan","Al-Mursalat","An-Naba","An-Nazi'at","Abasa","At-Takwir","Al-Infitar","Al-Mutaffifin","Al-Inshiqaq","Al-Buruj","At-Tariq","Al-A'la","Al-Ghashiyah","Al-Fajr","Al-Balad","Ash-Shams","Al-Layl","Ad-Duha","Ash-Sharh","At-Tin","Al-Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah","Al-Adiyat","Al-Qari'ah","At-Takathur","Al-Asr","Al-Humazah","Al-Fil","Quraysh","Al-Ma'un","Al-Kawthar","Al-Kafirun","An-Nasr","Al-Masad","Al-Ikhlas","Al-Falaq","An-Nas"];

const select = document.getElementById("surahSelect");

surahNames.forEach((n,i)=>{
let o=document.createElement("option");
o.value=i+1;
o.textContent=(i+1)+" - "+n;
select.appendChild(o);
});

// =====================
// LOAD SURAH
// =====================

async function loadSurah(){

const num = select.value;

const res = await fetch(`https://api.alquran.cloud/v1/surah/${num}/editions/quran-uthmani,en.sahih`);
const data = await res.json();

const ar = data.data[0].ayahs;
const en = data.data[1].ayahs;

let html="";

for(let i=0;i<ar.length;i++){
html+=`
<div class="ayah" onclick="playAyah(${num},${i+1},this)">
<div class="arabic">${ar[i].text}</div>
<div class="translation">${en[i].text}</div>
</div>`;
}

document.getElementById("quranText").innerHTML = html;

}

// =====================
// AUDIO SYSTEM
// =====================

let currentAudio=null;
let currentAyah=null;
let ayahList=[];

function playAyah(surah,ayah,el){

// toggle
if(currentAudio && currentAyah===ayah){

if(!currentAudio.paused){
currentAudio.pause();
return;
}else{
currentAudio.play();
return;
}

}

// stop old
if(currentAudio) currentAudio.pause();

// highlight
document.querySelectorAll(".ayah").forEach(a=>a.classList.remove("playing"));
el.classList.add("playing");
el.scrollIntoView({behavior:"smooth",block:"center"});

// save
currentAyah=ayah;
ayahList=document.querySelectorAll(".ayah");

// reciter
const reciter=document.getElementById("reciterSelect").value;

const s=String(surah).padStart(3,"0");
const a=String(ayah).padStart(3,"0");

const url=`https://everyayah.com/data/${reciter}/${s}${a}.mp3`;

currentAudio=new Audio(url);
currentAudio.play();

// auto next
currentAudio.onended=()=>{
let next=ayah+1;
if(ayahList[next-1]){
playAyah(surah,next,ayahList[next-1]);
}
};

}

// =====================
// DOWNLOAD
// =====================

function downloadSurah(){

const num = select.value;
const code = String(num).padStart(3,"0");

const url = `https://server8.mp3quran.net/afs/${code}.mp3`;

const a=document.createElement("a");
a.href=url;
a.download="surah.mp3";
a.click();

}

</script>

</body>
</html>

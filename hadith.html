<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daily Hadith - Chair Islamic TV</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFD700">

<link rel="stylesheet" href="styles.css">

<style>

.hadith-box{
background:#1a1a1a;
padding:20px;
margin-top:20px;
border-radius:10px;
}

.arabic{
font-size:22px;
direction:rtl;
margin-bottom:20px;
line-height:1.8;
}

.english{
font-size:16px;
color:#ddd;
line-height:1.6;
}

.source{
margin-top:15px;
font-size:14px;
color:#aaa;
}

</style>

</head>

<body>

<div class="container">

<h1>📜 Daily Hadith</h1>

<p>Authentic sayings of Prophet Muhammad ﷺ</p>

<div id="hadithBox" class="hadith-box">

<p>Loading Hadith...</p>

</div>

<button onclick="loadHadith()">🔄 New Hadith</button>

</div>


<!-- Bottom Navigation -->

<div class="bottom-nav">

<a href="index.html">🏠 Home</a>

<a href="quran.html">📖 Quran</a>

<a href="hadith.html">📜 Hadith</a>

<a href="prayer.html">🕌 Prayer</a>

<a href="videos.html">🎥 Videos</a>

</div>


<script>

async function loadHadith(){

const hadithBox = document.getElementById("hadithBox")

hadithBox.innerHTML="Loading Hadith..."

try{

const random = Math.floor(Math.random()*300)+1

const response = await fetch(
"https://api.sunnah.com/v1/hadiths/random"
)

const data = await response.json()

const hadith = data.hadith

hadithBox.innerHTML = `

<div class="arabic">
${hadith.arabic}
</div>

<div class="english">
${hadith.english}
</div>

<div class="source">
Source: ${hadith.collection}
</div>

`

}catch(error){

hadithBox.innerHTML = "Couldn't load hadith."

}

}

loadHadith()

</script>

</body>

</html>

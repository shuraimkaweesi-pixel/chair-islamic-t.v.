<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chair Islamic TV - Quran</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; background:#f5f5f5; }
h1 { text-align:center; color:#333; }
#quranControls { margin-bottom:20px; display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
select,input,button { padding:8px; font-size:16px; border-radius:5px; border:1px solid #ccc;}
#quranText { margin-bottom:90px; } /* bottom padding for floating audio */
.ayah { margin-bottom:15px; padding:15px; background:#fff; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.arabic { font-size:24px; text-align:right; direction:rtl; margin-bottom:5px; line-height:1.8; }
.translation { font-size:18px; color:#555; line-height:1.6; }
/* Floating audio */
#audioPlayer {
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:95%;
  max-width:600px;
  background:#fff;
  padding:10px 15px;
  border-radius:10px;
  box-shadow:0 4px 8px rgba(0,0,0,0.2);
  z-index:9999;
}
</style>
</head>
<body>

<h1>Quran</h1>

<div id="quranControls">
  <select id="surahSelect"><option value="">--Select Surah--</option></select>
  <select id="reciterSelect">
    <option value="afasy">Abdul Basit (Afasy)</option>
    <option value="baset">Abdul Basit (Baset)</option>
    <option value="ghamdi">Ghamdi</option>
  </select>
  <button onclick="loadSurah()">Load Surah</button>
</div>

<div id="quranText"></div>

<!-- Floating audio -->
<div id="audioPlayer"></div>

<script>
// ================== Load Quran JSON ==================
let quranData = [];
fetch('quran.json') // make sure quran.json is in the same folder
  .then(r => r.json())
  .then(data => {
    quranData = data;
    populateSurahSelect();
  })
  .catch(err => {
    console.error('Failed to load Quran JSON', err);
    document.getElementById('quranText').innerText = 'Failed to load Quran JSON';
  });

// ================== Populate Surah Dropdown ==================
function populateSurahSelect() {
  const select = document.getElementById('surahSelect');
  quranData.forEach(surah => {
    const option = document.createElement('option');
    option.value = surah.id;
    option.textContent = `${surah.id} - ${surah.transliteration} (${surah.name})`;
    select.appendChild(option);
  });
}

// ================== Load Surah ==================
function loadSurah() {
  const surahId = parseInt(document.getElementById('surahSelect').value);
  if(!surahId) { alert('Select a Surah'); return; }

  const surah = quranData.find(s => s.id === surahId);
  if(!surah) { alert('Surah not found'); return; }

  let html = '';
  surah.verses.forEach((v,i) => {
    html += `
      <div class="ayah">
        <div class="arabic">${i+1}. ${v.text}</div>
        ${v.en ? `<div class="translation">${i+1}. ${v.en}</div>` : ''}
      </div>
    `;
  });
  document.getElementById('quranText').innerHTML = html;

  // ================== Audio ==================
  const reciter = document.getElementById('reciterSelect').value;
  const reciters = {
    afasy:"https://server8.mp3quran.net/afs/",
    baset:"https://server8.mp3quran.net/bas/",
    ghamdi:"https://server7.mp3quran.net/s_gmd/"
  };
  const surahCode = String(surahId).padStart(3,'0');
  const audioURL = reciters[reciter] + surahCode + '.mp3';
  document.getElementById('audioPlayer').innerHTML = `
    <audio controls style="width:100%" src="${audioURL}"></audio>
  `;
}
</script>
</body>
</html>

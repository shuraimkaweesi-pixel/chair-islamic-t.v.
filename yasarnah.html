<div id="yasarnahSection">
  <h2>📖 Yasarnah - Alif to Yaa</h2>
  <div class="controls">
    <button id="letterPlayBtn" onclick="toggleLetterSequence()">▶ Play All</button>
    <button onclick="stopLetterLesson()">⏹ Stop</button>
    <select onchange="letterRepeatCount = parseInt(this.value)">
      <option value="1">Repeat 1x</option>
      <option value="3" selected>Repeat 3x</option>
      <option value="5">Repeat 5x</option>
    </select>
  </div>
  <div id="letterProgress">Tap any letter to start</div>
  <div id="lessonBox"></div>
</div>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chair Islamic TV - Home</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFD700">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="apple-touch-icon" href="logo.png">

<style>
body {
  background:#0f0f0f;
  color:#FFD700;
  font-family: Arial, sans-serif;
  margin:0;
  padding:20px;
  text-align:center;
}

.container {
  max-width:900px;
  margin:auto;
}

h1,h2 {
  color:#FFD700;
}

button {
  width:80%;
  padding:15px;
  margin:10px auto;
  background:#FFD700;
  color:black;
  font-weight:bold;
  font-size:16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button:hover {
  opacity:0.9;
}

/* Bottom Navigation */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#000;
  display:flex;
  justify-content:space-around;
  padding:12px 0;
  border-top:1px solid #333;
}
.bottom-nav a{
  color:#FFD700;
  text-decoration:none;
  font-size:14px;
  flex:1;
  text-align:center;
}
.bottom-nav a:hover{
  color:white;
}
</style>
</head>

<body>
<div class="container">

<h1>Welcome to Chair Islamic TV</h1>
<p>Read Quran, view Hadith, check Prayer Times, watch Islamic Videos.</p>

<!-- Feature Buttons -->
<h2>Features</h2>
<a href="quran.html"><button>📖 Quran Reader</button></a>
<a href="hadith.html"><button>📜 Daily Hadith</button></a>
<a href="prayer.html"><button>🕌 Prayer Times</button></a>
<a href="videos.html"><button>🎥 Latest Videos</button></a>

<!-- Install Button -->
<button id="installBtn" style="display:none;">Install Chair Islamic TV 📲</button>

</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
<a href="index.html">🏠 Home</a>
<a href="quran.html">📖 Quran</a>
<a href="hadith.html">📜 Hadith</a>
<a href="prayer.html">🕌 Prayer</a>
<a href="videos.html">🎥 Videos</a>
</div>

<script>
// PWA Install
let deferredPrompt;
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  const installBtn = document.getElementById("installBtn");
  installBtn.style.display = "block";

  installBtn.addEventListener("click", () => {
    installBtn.style.display = "none";
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then((choiceResult) => {
      deferredPrompt = null;
    });
  });
});

// Service Worker
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("worker.js")
      .then(reg => console.log("Service Worker Registered"))
      .catch(err => console.log("Service Worker Failed", err));
  });
}
</script>

</body>
</html>
